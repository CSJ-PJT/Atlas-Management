    <circle cx="194" cy="238" r="16" fill="#06a9cf" stroke="#f8fbff" stroke-width="6"/>
    <circle cx="138" cy="182" r="16" fill="#06a9cf" stroke="#f8fbff" stroke-width="6"/>
