    <rect x="568" y="276" width="42" height="42" rx="12" fill="#eef2ff"/>
    <text x="582" y="304" fill="#4f46e5" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="850">L</text>
    <text x="624" y="288" fill="#07152f" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="850">Learn</text>
