    <text x="362" y="156" fill="#4d6276" font-family="Inter, Segoe UI, Noto Sans KR, sans-serif" font-size="20" font-weight="650">Atlas 서비스군을 한 화면에서 진입하고 운영 상태를 확인하는 통합 포털</text>
    <g transform="translate(360 186)">
