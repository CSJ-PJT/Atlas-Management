    <text x="810" y="312" fill="#64748b" font-family="Inter, Segoe UI, Noto Sans KR, sans-serif" font-size="12" font-weight="650">건강 · 루틴</text>

    <rect x="918" y="252" width="170" height="90" rx="18" fill="#ffffff"/>
    <rect x="940" y="276" width="42" height="42" rx="12" fill="#fff7ed"/>
    <text x="954" y="304" fill="#b45309" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="850">J</text>
    <text x="996" y="288" fill="#07152f" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="850">Incruit</text>
    <text x="996" y="312" fill="#64748b" font-family="Inter, Segoe UI, Noto Sans KR, sans-serif" font-size="12" font-weight="650">채용 · 알림</text>
