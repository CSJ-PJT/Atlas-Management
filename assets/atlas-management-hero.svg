      <text x="20" y="23" fill="#ffffff" font-family="Inter, Segoe UI, Noto Sans KR, sans-serif" font-size="13" font-weight="800">ROOT /</text>
      <rect x="140" width="138" height="34" rx="17" fill="#e9f7fb" stroke="#b7dce8"/>
      <circle cx="160" cy="17" r="5" fill="#16a34a"/>
      <text x="174" y="23" fill="#0b2741" font-family="Inter, Segoe UI, Noto Sans KR, sans-serif" font-size="13" font-weight="800">운영 정상</text>
      <rect x="294" width="160" height="34" rx="17" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="316" y="23" fill="#9a5a12" font-family="Inter, Segoe UI, Noto Sans KR, sans-serif" font-size="13" font-weight="800">4 Services</text>
    </g>
  </g>

