  <g filter="url(#soft)">
    <rect x="878" y="74" width="244" height="128" rx="22" fill="#07152f"/>
    <text x="902" y="108" fill="#67e8f9" font-family="Inter, Segoe UI, sans-serif" font-size="13" font-weight="850">ATLAS OPS</text>
    <text x="902" y="142" fill="#ffffff" font-family="Inter, Segoe UI, sans-serif" font-size="28" font-weight="850">/api/health</text>
    <circle cx="908" cy="174" r="6" fill="#22c55e"/>
    <text x="924" y="180" fill="#cbd5e1" font-family="Inter, Segoe UI, Noto Sans KR, sans-serif" font-size="14" font-weight="700">서비스 상태 확인</text>
