<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Atlas Management README Hero</title>
  <desc id="desc">Atlas Management portal banner with Atlas logo, service cards, and operation status panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fbff"/>
      <stop offset=".52" stop-color="#eef6fb"/>
      <stop offset="1" stop-color="#e7edf7"/>
    </linearGradient>
    <linearGradient id="navy" x1="120" y1="340" x2="460" y2="34" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07152f"/>
      <stop offset=".58" stop-color="#0b2741"/>
      <stop offset="1" stop-color="#087ea4"/>
    </linearGradient>
    <linearGradient id="cyan" x1="86" y1="306" x2="316" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#07152f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
    <filter id="soft" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0284c7" flood-opacity=".16"/>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0v28" fill="none" stroke="#d7e3ee" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="34" fill="url(#grid)" opacity=".42"/>

  <path d="M0 310C168 260 260 386 420 328c160-58 248-190 418-156 124 24 208 118 362 72v176H0Z" fill="#dcecf6" opacity=".7"/>
  <path d="M894 32h210c32 0 58 26 58 58v154c0 32-26 58-58 58H894c-32 0-58-26-58-58V90c0-32 26-58 58-58Z" fill="#ffffff" opacity=".72"/>

